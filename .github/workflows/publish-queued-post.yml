name: Publish queued blog post

on:
  schedule:
    - cron: '0 9 * * 2'   # Every Tuesday at 09:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Pick next queued post
        id: pick
        run: |
          QUEUE="src/pages/blog/_queue"
          NEXT=$(find "$QUEUE" -maxdepth 1 -name "*.md" | sort | head -n 1)
          if [ -z "$NEXT" ]; then
            echo "Queue is empty — nothing to publish."
            echo "found=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          FILENAME=$(basename "$NEXT" | sed 's/^[0-9]*-//')
          echo "found=true" >> "$GITHUB_OUTPUT"
          echo "src=$NEXT" >> "$GITHUB_OUTPUT"
          echo "filename=$FILENAME" >> "$GITHUB_OUTPUT"
          echo "dest=src/pages/blog/$FILENAME" >> "$GITHUB_OUTPUT"

      - name: Inject date and move post
        if: steps.pick.outputs.found == 'true'
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          awk -v date="date: $TODAY" \
            'NR==1 && /^---$/ { print; print date; next } { print }' \
            "${{ steps.pick.outputs.src }}" > "${{ steps.pick.outputs.dest }}"
          rm "${{ steps.pick.outputs.src }}"

      - name: Commit and push
        if: steps.pick.outputs.found == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/pages/blog/
          git commit -m "chore(blog): publish ${{ steps.pick.outputs.filename }}"
          git push

      - name: Trigger deploy
        if: steps.pick.outputs.found == 'true'
        run: gh workflow run deploy.yml --ref main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

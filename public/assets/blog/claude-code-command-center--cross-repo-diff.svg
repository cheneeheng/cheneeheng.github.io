<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" role="img" aria-label="Many repos on one board, two files from two repos diffed line by line, and one copied over the other">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1120"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.12" r="0.7">
      <stop offset="0" stop-color="#34d399" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#34d399" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="1.2" cy="1.2" r="1.2" fill="#f8fafc" fill-opacity="0.05"/>
    </pattern>
  </defs>

  <rect width="1200" height="300" fill="url(#bg)"/>
  <rect width="1200" height="300" fill="url(#dots)"/>
  <rect width="1200" height="300" fill="url(#glow)"/>

  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" font-weight="600" fill="#94a3b8" text-anchor="middle">

    <!-- 1: board of repos, a pair highlighted -->
    <g transform="translate(90 70)">
      <rect width="300" height="160" rx="16" fill="#1e293b" stroke="#334155"/>
      <rect x="40"  y="44" width="56" height="34" rx="6" fill="#0f172a" stroke="#34d399" stroke-opacity="0.8"/>
      <rect x="108" y="44" width="56" height="34" rx="6" fill="#0b1120" stroke="#475569"/>
      <rect x="176" y="44" width="56" height="34" rx="6" fill="#0b1120" stroke="#475569"/>
      <rect x="40"  y="88" width="56" height="34" rx="6" fill="#0b1120" stroke="#475569"/>
      <rect x="108" y="88" width="56" height="34" rx="6" fill="#0b1120" stroke="#475569"/>
      <rect x="176" y="88" width="56" height="34" rx="6" fill="#0f172a" stroke="#34d399" stroke-opacity="0.8"/>
      <text x="150" y="148">every repo, one board</text>
    </g>

    <!-- 2: unified diff -->
    <g transform="translate(450 70)">
      <rect width="300" height="160" rx="16" fill="#1e293b" stroke="#334155"/>
      <rect x="36" y="40" width="228" height="80" rx="8" fill="#0b1120" stroke="#334155"/>
      <text x="48" y="62" font-size="11" fill="#fbbf24" text-anchor="start">- opus-4-7</text>
      <text x="48" y="82" font-size="11" fill="#6ee7b7" text-anchor="start">+ opus-4-8</text>
      <text x="48" y="102" font-size="11" fill="#64748b" text-anchor="start">&#160; timeout = 30</text>
      <text x="150" y="148">diff any two files</text>
    </g>

    <!-- 3: copy across -->
    <g transform="translate(810 70)">
      <rect width="300" height="160" rx="16" fill="#1e293b" stroke="#334155"/>
      <rect x="46" y="52" width="66" height="54" rx="8" fill="#0f172a" stroke="#34d399" stroke-opacity="0.7"/>
      <text x="79" y="84" font-size="16" fill="#6ee7b7">A</text>
      <rect x="188" y="52" width="66" height="54" rx="8" fill="#0f172a" stroke="#334155"/>
      <text x="221" y="84" font-size="16" fill="#64748b">B</text>
      <path d="M118 79 h60" stroke="#34d399" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      <path d="M182 79 l-14 -7 l0 14 z" fill="#34d399"/>
      <text x="150" y="148">copy the good one over</text>
    </g>

  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" role="img" aria-label="A browser terminal connected over a websocket to a Claude process inside a Docker container">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1120"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.3" r="0.6">
      <stop offset="0" stop-color="#34d399" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#34d399" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="1.2" cy="1.2" r="1.2" fill="#f8fafc" fill-opacity="0.05"/>
    </pattern>
  </defs>

  <rect width="1200" height="300" fill="url(#bg)"/>
  <rect width="1200" height="300" fill="url(#dots)"/>
  <rect width="1200" height="300" fill="url(#glow)"/>

  <!-- browser window: xterm.js terminal -->
  <g transform="translate(150 70)">
    <rect width="320" height="160" rx="14" fill="#1e293b" stroke="#334155"/>
    <rect width="320" height="34" rx="14" fill="#0f172a"/>
    <rect y="20" width="320" height="14" fill="#0f172a"/>
    <circle cx="22" cy="17" r="5" fill="#475569"/>
    <circle cx="42" cy="17" r="5" fill="#475569"/>
    <circle cx="62" cy="17" r="5" fill="#475569"/>
    <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="15" fill="#6ee7b7">
      <text x="20" y="72">&gt; Claude Code</text>
      <rect x="20" y="92" width="200" height="7" rx="3.5" fill="#475569"/>
      <rect x="20" y="110" width="150" height="7" rx="3.5" fill="#475569"/>
      <rect x="20" y="128" width="180" height="7" rx="3.5" fill="#475569"/>
      <rect x="226" y="124" width="10" height="16" fill="#34d399"/>
    </g>
  </g>

  <!-- websocket bridge -->
  <g stroke="#34d399" stroke-width="3" fill="none" stroke-linecap="round">
    <path d="M478 150 q26 -18 52 0 q26 18 52 0 q26 -18 52 0" stroke-opacity="0.85"/>
  </g>
  <path d="M686 150 l-16 -9 l4 18 z" fill="#34d399"/>
  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#64748b">
    <text x="582" y="128" text-anchor="middle">WebSocket</text>
    <text x="582" y="186" text-anchor="middle">node-pty</text>
  </g>

  <!-- docker container with claude process -->
  <g transform="translate(700 60)">
    <rect width="350" height="180" rx="16" fill="#0f172a" stroke="#34d399" stroke-opacity="0.55" stroke-dasharray="2 0"/>
    <text x="20" y="34" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" fill="#64748b">claude-user-default</text>
    <!-- inner claude node -->
    <g transform="translate(40 56)">
      <rect width="120" height="96" rx="14" fill="#1e293b" stroke="#34d399" stroke-opacity="0.8"/>
      <circle cx="60" cy="42" r="22" fill="none" stroke="#6ee7b7" stroke-width="3"/>
      <path d="M50 42 h20 M60 32 v20" stroke="#6ee7b7" stroke-width="3" stroke-linecap="round"/>
      <text x="60" y="84" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#94a3b8">Claude Code</text>
    </g>
    <!-- persistent volume -->
    <g transform="translate(190 56)">
      <path d="M0 18 a14 14 0 0 1 14 -14 h66 l40 40 v52 a14 14 0 0 1 -14 14 h-92 a14 14 0 0 1 -14 -14 z" fill="#0b1120" stroke="#334155"/>
      <path d="M80 4 v26 a14 14 0 0 0 14 14 h26" fill="none" stroke="#334155"/>
      <rect x="18" y="56" width="74" height="6" rx="3" fill="#475569"/>
      <rect x="18" y="70" width="54" height="6" rx="3" fill="#475569"/>
      <text x="60" y="104" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" fill="#64748b">/workspace</text>
    </g>
  </g>
</svg>

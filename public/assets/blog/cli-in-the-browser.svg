<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" role="img" aria-label="A left-to-right pipeline: browser xterm.js to a websocket to node-pty to docker exec to a CLI process">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1120"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.6">
      <stop offset="0" stop-color="#34d399" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#34d399" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="1.2" cy="1.2" r="1.2" fill="#f8fafc" fill-opacity="0.05"/>
    </pattern>
  </defs>

  <rect width="1200" height="300" fill="url(#bg)"/>
  <rect width="1200" height="300" fill="url(#dots)"/>
  <rect width="1200" height="300" fill="url(#glow)"/>

  <!-- pipeline baseline -->
  <g stroke="#34d399" stroke-width="3" fill="none" stroke-linecap="round" stroke-opacity="0.7">
    <line x1="240" y1="150" x2="320" y2="150"/>
    <line x1="470" y1="150" x2="550" y2="150"/>
    <line x1="700" y1="150" x2="780" y2="150"/>
    <line x1="930" y1="150" x2="1010" y2="150"/>
  </g>
  <g fill="#34d399">
    <path d="M320 150 l-16 -8 l0 16 z"/>
    <path d="M550 150 l-16 -8 l0 16 z"/>
    <path d="M780 150 l-16 -8 l0 16 z"/>
    <path d="M1010 150 l-16 -8 l0 16 z"/>
  </g>

  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" text-anchor="middle">

    <!-- 1: browser xterm.js -->
    <g transform="translate(100 110)">
      <rect width="140" height="80" rx="12" fill="#1e293b" stroke="#334155"/>
      <rect width="140" height="20" rx="12" fill="#0f172a"/>
      <rect y="10" width="140" height="10" fill="#0f172a"/>
      <circle cx="14" cy="10" r="3.5" fill="#475569"/>
      <circle cx="26" cy="10" r="3.5" fill="#475569"/>
      <text x="70" y="56" fill="#6ee7b7" font-size="15">&gt;_</text>
      <text x="70" y="104" fill="#94a3b8">xterm.js</text>
    </g>

    <!-- 2: websocket -->
    <g transform="translate(330 110)">
      <rect width="140" height="80" rx="12" fill="#1e293b" stroke="#334155"/>
      <path d="M22 40 q14 -16 28 0 q14 16 28 0 q14 -16 28 0" fill="none" stroke="#34d399" stroke-width="3" stroke-linecap="round"/>
      <text x="70" y="64" fill="#94a3b8" font-size="13">ws://</text>
      <text x="70" y="104" fill="#94a3b8">WebSocket</text>
    </g>

    <!-- 3: node-pty -->
    <g transform="translate(560 110)">
      <rect width="140" height="80" rx="12" fill="#1e293b" stroke="#334155"/>
      <g transform="translate(70 38)" stroke="#34d399" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <path d="M-16 -10 l12 10 l-12 10"/>
        <line x1="2" y1="10" x2="16" y2="10"/>
      </g>
      <text x="70" y="104" fill="#94a3b8">node-pty</text>
    </g>

    <!-- 4: docker exec -->
    <g transform="translate(790 110)">
      <rect width="140" height="80" rx="12" fill="#1e293b" stroke="#334155"/>
      <g transform="translate(40 26)" fill="#34d399" fill-opacity="0.85">
        <rect x="0" y="14" width="10" height="9" rx="1.5"/>
        <rect x="13" y="14" width="10" height="9" rx="1.5"/>
        <rect x="26" y="14" width="10" height="9" rx="1.5"/>
        <rect x="13" y="3" width="10" height="9" rx="1.5"/>
        <rect x="26" y="3" width="10" height="9" rx="1.5"/>
        <path d="M0 25 h44 q14 0 20 -8" fill="none" stroke="#34d399" stroke-width="2.5"/>
      </g>
      <text x="70" y="104" fill="#94a3b8">docker exec</text>
    </g>

    <!-- 5: CLI process -->
    <g transform="translate(1020 110)">
      <rect width="140" height="80" rx="12" fill="#0f172a" stroke="#34d399" stroke-opacity="0.7"/>
      <circle cx="70" cy="36" r="18" fill="none" stroke="#6ee7b7" stroke-width="3"/>
      <path d="M62 36 h16 M70 28 v16" stroke="#6ee7b7" stroke-width="3" stroke-linecap="round"/>
      <text x="70" y="104" fill="#94a3b8">your CLI</text>
    </g>

  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" role="img" aria-label="A usage dashboard: a by-project bar chart, an activity heatmap of when Claude Code gets used, and a rate-limit trajectory line climbing toward a cap">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1120"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.12" r="0.7">
      <stop offset="0" stop-color="#34d399" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#34d399" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="1.2" cy="1.2" r="1.2" fill="#f8fafc" fill-opacity="0.05"/>
    </pattern>
  </defs>

  <rect width="1200" height="300" fill="url(#bg)"/>
  <rect width="1200" height="300" fill="url(#dots)"/>
  <rect width="1200" height="300" fill="url(#glow)"/>

  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" font-weight="600" fill="#94a3b8" text-anchor="middle">

    <!-- 1: by-project bars -->
    <g transform="translate(90 70)">
      <rect width="300" height="160" rx="16" fill="#1e293b" stroke="#334155"/>
      <text x="150" y="40" font-size="12" fill="#64748b">by project</text>
      <rect x="46"  y="64" width="22" height="58" rx="3" fill="#34d399" fill-opacity="0.9"/>
      <rect x="88"  y="82" width="22" height="40" rx="3" fill="#34d399" fill-opacity="0.5"/>
      <rect x="130" y="48" width="22" height="74" rx="3" fill="#34d399" fill-opacity="1"/>
      <rect x="172" y="94" width="22" height="28" rx="3" fill="#34d399" fill-opacity="0.4"/>
      <rect x="214" y="72" width="22" height="50" rx="3" fill="#34d399" fill-opacity="0.7"/>
      <text x="150" y="148">who ate the week</text>
    </g>

    <!-- 2: activity heatmap -->
    <g transform="translate(450 70)">
      <rect width="300" height="160" rx="16" fill="#1e293b" stroke="#334155"/>
      <text x="150" y="38" font-size="12" fill="#64748b">activity</text>
      <g fill="#34d399">
        <rect x="58"  y="50" width="22" height="18" rx="3" fill-opacity="0.25"/>
        <rect x="86"  y="50" width="22" height="18" rx="3" fill-opacity="0.55"/>
        <rect x="114" y="50" width="22" height="18" rx="3" fill-opacity="0.15"/>
        <rect x="142" y="50" width="22" height="18" rx="3" fill-opacity="0.8"/>
        <rect x="170" y="50" width="22" height="18" rx="3" fill-opacity="0.4"/>
        <rect x="198" y="50" width="22" height="18" rx="3" fill-opacity="0.9"/>
        <rect x="226" y="50" width="22" height="18" rx="3" fill-opacity="0.3"/>
        <rect x="58"  y="74" width="22" height="18" rx="3" fill-opacity="0.5"/>
        <rect x="86"  y="74" width="22" height="18" rx="3" fill-opacity="0.2"/>
        <rect x="114" y="74" width="22" height="18" rx="3" fill-opacity="0.7"/>
        <rect x="142" y="74" width="22" height="18" rx="3" fill-opacity="1"/>
        <rect x="170" y="74" width="22" height="18" rx="3" fill-opacity="0.35"/>
        <rect x="198" y="74" width="22" height="18" rx="3" fill-opacity="0.6"/>
        <rect x="226" y="74" width="22" height="18" rx="3" fill-opacity="0.15"/>
        <rect x="58"  y="98" width="22" height="18" rx="3" fill-opacity="0.15"/>
        <rect x="86"  y="98" width="22" height="18" rx="3" fill-opacity="0.45"/>
        <rect x="114" y="98" width="22" height="18" rx="3" fill-opacity="0.9"/>
        <rect x="142" y="98" width="22" height="18" rx="3" fill-opacity="0.3"/>
        <rect x="170" y="98" width="22" height="18" rx="3" fill-opacity="0.7"/>
        <rect x="198" y="98" width="22" height="18" rx="3" fill-opacity="0.2"/>
        <rect x="226" y="98" width="22" height="18" rx="3" fill-opacity="0.55"/>
      </g>
      <text x="150" y="148">when I lean on it</text>
    </g>

    <!-- 3: rate-limit trajectory -->
    <g transform="translate(810 70)">
      <rect width="300" height="160" rx="16" fill="#1e293b" stroke="#334155"/>
      <text x="150" y="38" font-size="12" fill="#64748b">rate-limit trajectory</text>
      <line x1="40" y1="58" x2="260" y2="58" stroke="#475569" stroke-width="1.5" stroke-dasharray="5 5"/>
      <text x="256" y="52" font-size="10" fill="#64748b" text-anchor="end">cap</text>
      <polyline points="44,118 88,110 128,96 168,84 202,72 232,60" fill="none" stroke="#34d399" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="232" cy="60" r="4.5" fill="#34d399"/>
      <text x="150" y="148">when I hit the wall</text>
    </g>

  </g>
</svg>

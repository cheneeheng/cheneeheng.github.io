<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" role="img" aria-label="Two mirrored implementations writing to one shared file, with a lowercase-vs-uppercase drive-letter path mismatch">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1120"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.1" r="0.7">
      <stop offset="0" stop-color="#34d399" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#34d399" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="1.2" cy="1.2" r="1.2" fill="#f8fafc" fill-opacity="0.05"/>
    </pattern>
  </defs>

  <rect width="1200" height="300" fill="url(#bg)"/>
  <rect width="1200" height="300" fill="url(#dots)"/>
  <rect width="1200" height="300" fill="url(#glow)"/>

  <!-- connectors: both surfaces -> central contract -->
  <g stroke="#34d399" stroke-opacity="0.55" stroke-width="2.5" stroke-dasharray="6 8">
    <line x1="370" y1="120" x2="540" y2="130"/>
    <line x1="830" y1="120" x2="660" y2="130"/>
  </g>

  <!-- left surface (Python) -->
  <g transform="translate(180 60)">
    <rect width="190" height="120" rx="14" fill="#1e293b" stroke="#334155"/>
    <rect x="18" y="18" width="26" height="26" rx="8" fill="#34d399" fill-opacity="0.18"/>
    <rect x="25" y="25" width="12" height="12" rx="3.5" fill="#34d399"/>
    <rect x="56" y="24" width="86" height="8" rx="4" fill="#64748b"/>
    <rect x="18" y="62" width="150" height="7" rx="3.5" fill="#475569"/>
    <rect x="18" y="78" width="120" height="7" rx="3.5" fill="#475569"/>
    <rect x="18" y="94" width="138" height="7" rx="3.5" fill="#475569"/>
  </g>

  <!-- right surface (Node) — mirrored layout -->
  <g transform="translate(830 60)">
    <rect width="190" height="120" rx="14" fill="#1e293b" stroke="#334155"/>
    <rect x="146" y="18" width="26" height="26" rx="8" fill="#34d399" fill-opacity="0.18"/>
    <rect x="153" y="25" width="12" height="12" rx="3.5" fill="#34d399"/>
    <rect x="48" y="24" width="86" height="8" rx="4" fill="#64748b"/>
    <rect x="22" y="62" width="150" height="7" rx="3.5" fill="#475569"/>
    <rect x="52" y="78" width="120" height="7" rx="3.5" fill="#475569"/>
    <rect x="34" y="94" width="138" height="7" rx="3.5" fill="#475569"/>
  </g>

  <!-- central contract: settings.local.json -->
  <g transform="translate(540 80)">
    <path d="M0 14 a14 14 0 0 1 14 -14 h66 l40 40 v86 a14 14 0 0 1 -14 14 h-92 a14 14 0 0 1 -14 -14 z" fill="#0f172a" stroke="#34d399" stroke-opacity="0.7"/>
    <path d="M80 0 v26 a14 14 0 0 0 14 14 h26" fill="none" stroke="#34d399" stroke-opacity="0.7"/>
    <rect x="18" y="52" width="84" height="6" rx="3" fill="#475569"/>
    <rect x="18" y="66" width="60" height="6" rx="3" fill="#475569"/>
    <rect x="18" y="80" width="74" height="6" rx="3" fill="#475569"/>
    <circle cx="60" cy="118" r="4" fill="#34d399"/>
  </g>

  <!-- the Windows nightmare: C:\ vs c:\ treated as different -->
  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="22" font-weight="600">
    <!-- correct -->
    <rect x="372" y="226" width="150" height="44" rx="10" fill="#34d399" fill-opacity="0.12" stroke="#34d399" stroke-opacity="0.5"/>
    <text x="447" y="255" text-anchor="middle" fill="#6ee7b7">C:\path</text>
    <!-- mismatch -->
    <text x="600" y="257" text-anchor="middle" font-size="30" fill="#fbbf24">&#8800;</text>
    <!-- offender -->
    <rect x="678" y="226" width="150" height="44" rx="10" fill="#fbbf24" fill-opacity="0.10" stroke="#fbbf24" stroke-opacity="0.55"/>
    <text x="753" y="255" text-anchor="middle" fill="#fbbf24">c:\path</text>
    <!-- warning spark -->
    <path d="M848 232 l11 19 h-22 z" fill="none" stroke="#fbbf24" stroke-width="2" stroke-linejoin="round"/>
    <rect x="847.5" y="240" width="3" height="6" rx="1.5" fill="#fbbf24"/>
    <rect x="847.5" y="248" width="3" height="3" rx="1.5" fill="#fbbf24"/>
  </g>
</svg>

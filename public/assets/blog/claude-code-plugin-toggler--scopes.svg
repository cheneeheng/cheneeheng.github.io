<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" role="img" aria-label="Three stacked settings files — local gitignored, project committed, user home-wide — feeding one plugin toggle list">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1120"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.28" cy="0.1" r="0.7">
      <stop offset="0" stop-color="#34d399" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#34d399" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="1.2" cy="1.2" r="1.2" fill="#f8fafc" fill-opacity="0.05"/>
    </pattern>
  </defs>

  <rect width="1200" height="300" fill="url(#bg)"/>
  <rect width="1200" height="300" fill="url(#dots)"/>
  <rect width="1200" height="300" fill="url(#glow)"/>

  <!-- connectors: three scope files -> central toggle list -->
  <g stroke="#34d399" stroke-opacity="0.5" stroke-width="2.5" stroke-dasharray="6 8">
    <line x1="430" y1="72" x2="690" y2="120"/>
    <line x1="430" y1="152" x2="690" y2="150"/>
    <line x1="430" y1="232" x2="690" y2="180"/>
  </g>

  <!-- three scope file cards (width 280, height 64; text fully inside) -->
  <g>
    <!-- LOCAL — gitignored, just you -->
    <g transform="translate(150 40)">
      <path d="M0 12 a12 12 0 0 1 12 -12 h238 l30 30 v22 a12 12 0 0 1 -12 12 h-256 a12 12 0 0 1 -12 -12 z" fill="#0f172a" stroke="#475569"/>
      <path d="M250 0 v18 a12 12 0 0 0 12 12 h18" fill="none" stroke="#475569"/>
      <text x="20" y="28" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="15" fill="#94a3b8" font-weight="600">settings.local.json</text>
      <text x="20" y="48" font-family="ui-sans-serif, system-ui, sans-serif" font-size="12.5" fill="#64748b">LOCAL &#183; gitignored, just you</text>
    </g>
    <!-- PROJECT — committed, travels with the repo -->
    <g transform="translate(150 120)">
      <path d="M0 12 a12 12 0 0 1 12 -12 h238 l30 30 v22 a12 12 0 0 1 -12 12 h-256 a12 12 0 0 1 -12 -12 z" fill="#0f172a" stroke="#34d399" stroke-opacity="0.85"/>
      <path d="M250 0 v18 a12 12 0 0 0 12 12 h18" fill="none" stroke="#34d399" stroke-opacity="0.85"/>
      <text x="20" y="28" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="15" fill="#6ee7b7" font-weight="700">settings.json</text>
      <text x="20" y="48" font-family="ui-sans-serif, system-ui, sans-serif" font-size="12.5" fill="#34d399" fill-opacity="0.9">PROJECT &#183; committed to git</text>
    </g>
    <!-- USER — home-wide -->
    <g transform="translate(150 200)">
      <path d="M0 12 a12 12 0 0 1 12 -12 h238 l30 30 v22 a12 12 0 0 1 -12 12 h-256 a12 12 0 0 1 -12 -12 z" fill="#0f172a" stroke="#475569"/>
      <path d="M250 0 v18 a12 12 0 0 0 12 12 h18" fill="none" stroke="#475569"/>
      <text x="20" y="28" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="15" fill="#94a3b8" font-weight="600">~/.claude/settings.json</text>
      <text x="20" y="48" font-family="ui-sans-serif, system-ui, sans-serif" font-size="12.5" fill="#64748b">USER &#183; you, every project</text>
    </g>
  </g>

  <!-- central toggle list -->
  <g transform="translate(690 96)" font-family="ui-sans-serif, system-ui, sans-serif">
    <rect width="360" height="108" rx="16" fill="#1e293b" stroke="#334155"/>
    <!-- row 1 ON -->
    <g transform="translate(20 16)">
      <rect x="0" y="2" width="22" height="22" rx="6" fill="#34d399" fill-opacity="0.18"/>
      <rect x="6" y="8" width="10" height="10" rx="3" fill="#34d399"/>
      <rect x="36" y="6" width="150" height="8" rx="4" fill="#64748b"/>
      <rect x="282" y="3" width="48" height="24" rx="12" fill="#34d399"/>
      <circle cx="318" cy="15" r="9" fill="#f8fafc"/>
    </g>
    <!-- row 2 ON -->
    <g transform="translate(20 52)">
      <rect x="0" y="2" width="22" height="22" rx="6" fill="#34d399" fill-opacity="0.18"/>
      <rect x="6" y="8" width="10" height="10" rx="3" fill="#34d399"/>
      <rect x="36" y="6" width="120" height="8" rx="4" fill="#64748b"/>
      <rect x="282" y="3" width="48" height="24" rx="12" fill="#34d399"/>
      <circle cx="318" cy="15" r="9" fill="#f8fafc"/>
    </g>
    <!-- row 3 OFF -->
    <g transform="translate(20 88)">
      <rect x="0" y="-4" width="22" height="22" rx="6" fill="#475569" fill-opacity="0.35"/>
      <rect x="6" y="2" width="10" height="10" rx="3" fill="#64748b"/>
      <rect x="36" y="0" width="96" height="8" rx="4" fill="#475569"/>
      <rect x="282" y="-3" width="48" height="24" rx="12" fill="#334155"/>
      <circle cx="294" cy="9" r="9" fill="#94a3b8"/>
    </g>
  </g>
</svg>

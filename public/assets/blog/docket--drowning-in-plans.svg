<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" role="img" aria-label="Plans piled across many repos, gathered onto one board showing each plan's lifecycle status, then run as a batch grouped by project">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1120"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.12" r="0.7">
      <stop offset="0" stop-color="#34d399" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#34d399" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="1.2" cy="1.2" r="1.2" fill="#f8fafc" fill-opacity="0.05"/>
    </pattern>
  </defs>

  <rect width="1200" height="300" fill="url(#bg)"/>
  <rect width="1200" height="300" fill="url(#dots)"/>
  <rect width="1200" height="300" fill="url(#glow)"/>

  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" font-weight="600" fill="#94a3b8" text-anchor="middle">

    <!-- 1: plans piled across repos -->
    <g transform="translate(90 70)">
      <rect width="300" height="160" rx="16" fill="#1e293b" stroke="#334155"/>
      <g fill="#0b1120" stroke="#475569">
        <rect x="46"  y="40" width="34" height="44" rx="5"/>
        <rect x="96"  y="48" width="34" height="44" rx="5"/>
        <rect x="150" y="42" width="34" height="44" rx="5"/>
        <rect x="204" y="50" width="34" height="44" rx="5"/>
        <rect x="72"  y="72" width="34" height="44" rx="5"/>
        <rect x="176" y="74" width="34" height="44" rx="5"/>
      </g>
      <g stroke="#475569" stroke-width="1.5">
        <line x1="52" y1="52" x2="74" y2="52"/><line x1="52" y1="60" x2="74" y2="60"/>
        <line x1="156" y1="54" x2="178" y2="54"/><line x1="156" y1="62" x2="178" y2="62"/>
      </g>
      <text x="150" y="148">plans across ten repos</text>
    </g>

    <!-- 2: one board with lifecycle status -->
    <g transform="translate(450 70)">
      <rect width="300" height="160" rx="16" fill="#1e293b" stroke="#334155"/>
      <g font-size="10">
        <g transform="translate(36 44)"><rect width="228" height="22" rx="5" fill="#0b1120" stroke="#334155"/><text x="12" y="15" fill="#94a3b8" text-anchor="start">plan-a</text><rect x="150" y="4" width="70" height="14" rx="7" fill="#334155"/><text x="185" y="15" fill="#cbd5e1">ready</text></g>
        <g transform="translate(36 72)"><rect width="228" height="22" rx="5" fill="#0b1120" stroke="#334155"/><text x="12" y="15" fill="#94a3b8" text-anchor="start">plan-b</text><rect x="150" y="4" width="70" height="14" rx="7" fill="#34d399" fill-opacity="0.35" stroke="#34d399" stroke-opacity="0.6"/><text x="185" y="15" fill="#6ee7b7">running</text></g>
        <g transform="translate(36 100)"><rect width="228" height="22" rx="5" fill="#0b1120" stroke="#334155"/><text x="12" y="15" fill="#94a3b8" text-anchor="start">plan-c</text><rect x="150" y="4" width="70" height="14" rx="7" fill="#34d399" fill-opacity="0.85"/><text x="185" y="15" fill="#06281d">done</text></g>
      </g>
      <text x="150" y="148">one board, one status</text>
    </g>

    <!-- 3: batch, grouped by project, parallel -->
    <g transform="translate(810 70)">
      <rect width="300" height="160" rx="16" fill="#1e293b" stroke="#334155"/>
      <g font-size="10" fill="#94a3b8">
        <g transform="translate(30 44)"><rect width="96" height="72" rx="8" fill="#0b1120" stroke="#334155"/><text x="48" y="16" fill="#64748b">project A</text><rect x="14" y="26" width="68" height="14" rx="4" fill="#0f172a" stroke="#475569"/><rect x="14" y="46" width="68" height="14" rx="4" fill="#0f172a" stroke="#475569"/></g>
        <g transform="translate(174 44)"><rect width="96" height="72" rx="8" fill="#0b1120" stroke="#334155"/><text x="48" y="16" fill="#64748b">project B</text><rect x="14" y="26" width="68" height="14" rx="4" fill="#0f172a" stroke="#475569"/><rect x="14" y="46" width="68" height="14" rx="4" fill="#0f172a" stroke="#475569"/></g>
      </g>
      <path d="M126 80 h48" stroke="#34d399" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      <path d="M174 80 l-12 -6 l0 12 z" fill="#34d399"/>
      <text x="150" y="148">batch, by project</text>
    </g>

  </g>
</svg>

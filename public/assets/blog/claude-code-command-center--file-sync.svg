<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" role="img" aria-label="Two folders kept in sync newer-wins in both directions, a raw copy clobbering a machine-specific settings key, and a merge that keeps that key while newer values win">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1120"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.12" r="0.7">
      <stop offset="0" stop-color="#34d399" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#34d399" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="1.2" cy="1.2" r="1.2" fill="#f8fafc" fill-opacity="0.05"/>
    </pattern>
  </defs>

  <rect width="1200" height="300" fill="url(#bg)"/>
  <rect width="1200" height="300" fill="url(#dots)"/>
  <rect width="1200" height="300" fill="url(#glow)"/>

  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" font-weight="600" fill="#94a3b8" text-anchor="middle">

    <!-- 1: two folders, newer wins either way -->
    <g transform="translate(90 70)">
      <rect width="300" height="160" rx="16" fill="#1e293b" stroke="#334155"/>
      <rect x="44" y="52" width="66" height="54" rx="8" fill="#0f172a" stroke="#34d399" stroke-opacity="0.7"/>
      <text x="77" y="84" font-size="15" fill="#6ee7b7">A</text>
      <rect x="190" y="52" width="66" height="54" rx="8" fill="#0f172a" stroke="#34d399" stroke-opacity="0.7"/>
      <text x="223" y="84" font-size="15" fill="#6ee7b7">B</text>
      <path d="M116 70 H180" stroke="#34d399" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      <path d="M180 70 l-13 -6 l0 12 z" fill="#34d399"/>
      <path d="M184 90 H120" stroke="#34d399" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      <path d="M120 90 l13 -6 l0 12 z" fill="#34d399"/>
      <text x="150" y="148">newer wins, either way</text>
    </g>

    <!-- 2: raw copy clobbered a machine key -->
    <g transform="translate(450 70)">
      <rect width="300" height="160" rx="16" fill="#1e293b" stroke="#334155"/>
      <rect x="36" y="42" width="228" height="80" rx="8" fill="#0b1120" stroke="#334155"/>
      <text x="48" y="62" font-size="11" fill="#94a3b8" text-anchor="start">settings.json</text>
      <text x="48" y="84" font-size="11" fill="#fbbf24" text-anchor="start">statusLine.command</text>
      <line x1="214" y1="76" x2="230" y2="92" stroke="#fbbf24" stroke-width="2"/>
      <line x1="230" y1="76" x2="214" y2="92" stroke="#fbbf24" stroke-width="2"/>
      <text x="150" y="148">raw copy clobbered it</text>
    </g>

    <!-- 3: merge keeps machine keys -->
    <g transform="translate(810 70)">
      <rect width="300" height="160" rx="16" fill="#1e293b" stroke="#334155"/>
      <rect x="48" y="46" width="204" height="18" rx="4" fill="#0b1120" stroke="#334155"/>
      <rect x="54" y="50" width="70" height="10" rx="3" fill="#34d399" fill-opacity="0.8"/>
      <rect x="48" y="70" width="204" height="18" rx="4" fill="#0b1120" stroke="#334155"/>
      <rect x="54" y="74" width="96" height="10" rx="3" fill="#34d399" fill-opacity="0.8"/>
      <rect x="48" y="94" width="204" height="18" rx="4" fill="#0b1120" stroke="#475569"/>
      <rect x="228" y="97" width="12" height="10" rx="2" fill="none" stroke="#94a3b8"/>
      <path d="M231 97 v-3 a3 3 0 0 1 6 0 v3" fill="none" stroke="#94a3b8" stroke-width="1.2"/>
      <text x="56" y="107" font-size="10" fill="#94a3b8" text-anchor="start">statusLine.command</text>
      <text x="150" y="148">merge keeps machine keys</text>
    </g>

  </g>
</svg>

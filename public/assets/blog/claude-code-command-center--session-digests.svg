<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" role="img" aria-label="Sessions processed on a nightly schedule, their lessons funnelled into one weekly master file, runnable as either an unattended cron or an on-demand skill">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1120"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.12" r="0.7">
      <stop offset="0" stop-color="#34d399" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#34d399" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="1.2" cy="1.2" r="1.2" fill="#f8fafc" fill-opacity="0.05"/>
    </pattern>
  </defs>

  <rect width="1200" height="300" fill="url(#bg)"/>
  <rect width="1200" height="300" fill="url(#dots)"/>
  <rect width="1200" height="300" fill="url(#glow)"/>

  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" font-weight="600" fill="#94a3b8" text-anchor="middle">

    <!-- 1: sessions, each night -->
    <g transform="translate(90 70)">
      <rect width="300" height="160" rx="16" fill="#1e293b" stroke="#334155"/>
      <circle cx="66" cy="60" r="16" fill="#34d399" fill-opacity="0.7"/>
      <circle cx="72" cy="56" r="14" fill="#1e293b"/>
      <text x="170" y="66" font-size="18" fill="#6ee7b7">02:00</text>
      <rect x="104" y="84" width="36" height="26" rx="4" fill="#0b1120" stroke="#475569"/>
      <rect x="150" y="84" width="36" height="26" rx="4" fill="#0b1120" stroke="#475569"/>
      <rect x="196" y="84" width="36" height="26" rx="4" fill="#0b1120" stroke="#475569"/>
      <text x="150" y="148">sessions, each night</text>
    </g>

    <!-- 2: lessons funnel into a weekly master -->
    <g transform="translate(450 70)">
      <rect width="300" height="160" rx="16" fill="#1e293b" stroke="#334155"/>
      <rect x="52"  y="42" width="44" height="22" rx="5" fill="#0f172a" stroke="#475569"/>
      <rect x="128" y="42" width="44" height="22" rx="5" fill="#0f172a" stroke="#475569"/>
      <rect x="204" y="42" width="44" height="22" rx="5" fill="#0f172a" stroke="#475569"/>
      <path d="M74 64 L150 90 M150 64 L150 90 M226 64 L150 90" stroke="#475569" stroke-width="1.5" fill="none"/>
      <rect x="108" y="90" width="84" height="30" rx="6" fill="#0b1120" stroke="#34d399" stroke-opacity="0.8"/>
      <text x="150" y="110" font-size="11" fill="#6ee7b7">weekly</text>
      <text x="150" y="148">lessons that compound</text>
    </g>

    <!-- 3: cron vs skill -->
    <g transform="translate(810 70)">
      <rect width="300" height="160" rx="16" fill="#1e293b" stroke="#334155"/>
      <text x="56" y="62" font-size="12" fill="#6ee7b7" text-anchor="start">cron</text>
      <circle cx="210" cy="57" r="13" fill="#fbbf24" fill-opacity="0.18" stroke="#fbbf24" stroke-opacity="0.7"/>
      <text x="210" y="61" font-size="12" fill="#fbbf24">$</text>
      <text x="56" y="102" font-size="12" fill="#6ee7b7" text-anchor="start">skill</text>
      <rect x="188" y="90" width="44" height="20" rx="6" fill="#0f172a" stroke="#34d399" stroke-opacity="0.7"/>
      <text x="210" y="104" font-size="10" fill="#94a3b8">live</text>
      <text x="150" y="148">two ways to run</text>
    </g>

  </g>
</svg>

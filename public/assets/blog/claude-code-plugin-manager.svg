<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" role="img" aria-label="Rows of plugin toggle switches">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1120"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.82" cy="0.12" r="0.6">
      <stop offset="0" stop-color="#34d399" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#34d399" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="1.2" cy="1.2" r="1.2" fill="#f8fafc" fill-opacity="0.05"/>
    </pattern>
  </defs>

  <rect width="1200" height="300" fill="url(#bg)"/>
  <rect width="1200" height="300" fill="url(#dots)"/>
  <rect width="1200" height="300" fill="url(#glow)"/>

  <!-- toggle rows: on / off / on -->
  <g font-family="ui-sans-serif, system-ui, sans-serif">
    <!-- row 1 — ON -->
    <g transform="translate(340 40)">
      <rect width="520" height="60" rx="14" fill="#1e293b" stroke="#334155"/>
      <rect x="18" y="14" width="32" height="32" rx="9" fill="#34d399" fill-opacity="0.18"/>
      <rect x="27" y="23" width="14" height="14" rx="4" fill="#34d399"/>
      <rect x="66" y="20" width="170" height="9" rx="4.5" fill="#64748b"/>
      <rect x="66" y="36" width="104" height="7" rx="3.5" fill="#475569"/>
      <rect x="446" y="15" width="56" height="30" rx="15" fill="#34d399"/>
      <circle cx="487" cy="30" r="11" fill="#f8fafc"/>
    </g>
    <!-- row 2 — OFF -->
    <g transform="translate(340 120)">
      <rect width="520" height="60" rx="14" fill="#1e293b" stroke="#334155"/>
      <rect x="18" y="14" width="32" height="32" rx="9" fill="#475569" fill-opacity="0.35"/>
      <rect x="27" y="23" width="14" height="14" rx="4" fill="#64748b"/>
      <rect x="66" y="20" width="140" height="9" rx="4.5" fill="#475569"/>
      <rect x="66" y="36" width="86" height="7" rx="3.5" fill="#3f4a5c"/>
      <rect x="446" y="15" width="56" height="30" rx="15" fill="#334155"/>
      <circle cx="461" cy="30" r="11" fill="#94a3b8"/>
    </g>
    <!-- row 3 — ON (with cursor) -->
    <g transform="translate(340 200)">
      <rect width="520" height="60" rx="14" fill="#1e293b" stroke="#334155"/>
      <rect x="18" y="14" width="32" height="32" rx="9" fill="#34d399" fill-opacity="0.18"/>
      <rect x="27" y="23" width="14" height="14" rx="4" fill="#34d399"/>
      <rect x="66" y="20" width="200" height="9" rx="4.5" fill="#64748b"/>
      <rect x="66" y="36" width="120" height="7" rx="3.5" fill="#475569"/>
      <rect x="446" y="15" width="56" height="30" rx="15" fill="#34d399"/>
      <circle cx="487" cy="30" r="11" fill="#f8fafc"/>
      <!-- click ripple -->
      <circle cx="487" cy="30" r="20" fill="none" stroke="#34d399" stroke-opacity="0.5"/>
      <!-- cursor -->
      <path d="M500 44 L500 70 L507 63 L512 73 L516 71 L511 61 L520 61 Z" fill="#f8fafc" stroke="#0b1120" stroke-width="1.5" stroke-linejoin="round"/>
    </g>
  </g>
</svg>

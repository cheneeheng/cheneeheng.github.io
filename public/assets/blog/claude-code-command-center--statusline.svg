<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" role="img" aria-label="A Claude Code status line growing from a context-window bar, to 5-hour and 7-day rate-limit gauges, to a cost figure marked as one to squint at">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1120"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.12" r="0.7">
      <stop offset="0" stop-color="#34d399" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#34d399" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="1.2" cy="1.2" r="1.2" fill="#f8fafc" fill-opacity="0.05"/>
    </pattern>
  </defs>

  <rect width="1200" height="300" fill="url(#bg)"/>
  <rect width="1200" height="300" fill="url(#dots)"/>
  <rect width="1200" height="300" fill="url(#glow)"/>

  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" font-weight="600" fill="#94a3b8" text-anchor="middle">

    <!-- 1: context gauge -->
    <g transform="translate(90 70)">
      <rect width="300" height="160" rx="16" fill="#1e293b" stroke="#334155"/>
      <text x="150" y="42" font-size="12" fill="#64748b">context window</text>
      <rect x="40" y="64" width="220" height="18" rx="9" fill="#0b1120" stroke="#334155"/>
      <rect x="40" y="64" width="92" height="18" rx="9" fill="#34d399" fill-opacity="0.85"/>
      <text x="150" y="112" font-size="16" fill="#6ee7b7">42%</text>
      <text x="150" y="148">before it compacts</text>
    </g>

    <!-- 2: rate limits -->
    <g transform="translate(450 70)">
      <rect width="300" height="160" rx="16" fill="#1e293b" stroke="#334155"/>
      <text x="60" y="62" font-size="12" fill="#6ee7b7" text-anchor="start">5H</text>
      <rect x="95" y="52" width="120" height="12" rx="6" fill="#0b1120" stroke="#334155"/>
      <rect x="95" y="52" width="42" height="12" rx="6" fill="#34d399" fill-opacity="0.85"/>
      <text x="252" y="62" font-size="12" fill="#94a3b8" text-anchor="end">35%</text>
      <text x="60" y="100" font-size="12" fill="#6ee7b7" text-anchor="start">7D</text>
      <rect x="95" y="90" width="120" height="12" rx="6" fill="#0b1120" stroke="#334155"/>
      <rect x="95" y="90" width="96" height="12" rx="6" fill="#34d399" fill-opacity="0.85"/>
      <text x="252" y="100" font-size="12" fill="#94a3b8" text-anchor="end">80%</text>
      <text x="150" y="148">rate limits, for free</text>
    </g>

    <!-- 3: cost, held at arm's length -->
    <g transform="translate(810 70)">
      <rect width="300" height="160" rx="16" fill="#1e293b" stroke="#334155"/>
      <text x="150" y="90" font-size="22" fill="#fbbf24">&#8776; $1.23</text>
      <text x="150" y="114" font-size="11" fill="#94a3b8">may differ from your bill</text>
      <text x="150" y="148">the one I squint at</text>
    </g>

  </g>
</svg>

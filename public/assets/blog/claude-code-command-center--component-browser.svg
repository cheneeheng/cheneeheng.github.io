<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" role="img" aria-label="Skills, agents and hooks scattered across plugins and loose folders, gathered into one searchable list, with a name collision resolved by striking through the shadowed loser">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1120"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.12" r="0.7">
      <stop offset="0" stop-color="#34d399" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#34d399" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="1.2" cy="1.2" r="1.2" fill="#f8fafc" fill-opacity="0.05"/>
    </pattern>
  </defs>

  <rect width="1200" height="300" fill="url(#bg)"/>
  <rect width="1200" height="300" fill="url(#dots)"/>
  <rect width="1200" height="300" fill="url(#glow)"/>

  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" font-weight="600" fill="#94a3b8" text-anchor="middle">

    <!-- 1: scattered across plugins + loose -->
    <g transform="translate(90 70)">
      <rect width="300" height="160" rx="16" fill="#1e293b" stroke="#334155"/>
      <g font-size="10" fill="#94a3b8">
        <g transform="translate(40 44)"><rect width="70" height="24" rx="6" fill="#0b1120" stroke="#475569"/><text x="35" y="16">skill</text></g>
        <g transform="translate(150 38)"><rect width="70" height="24" rx="6" fill="#0b1120" stroke="#475569"/><text x="35" y="16">agent</text></g>
        <g transform="translate(200 78)"><rect width="60" height="24" rx="6" fill="#0b1120" stroke="#475569"/><text x="30" y="16">hook</text></g>
        <g transform="translate(56 84)"><rect width="70" height="24" rx="6" fill="#0b1120" stroke="#475569"/><text x="35" y="16">loose</text></g>
      </g>
      <text x="150" y="128" font-size="22" fill="#64748b">?</text>
      <text x="150" y="148">where is everything</text>
    </g>

    <!-- 2: one searchable list with scope badges -->
    <g transform="translate(450 70)">
      <rect width="300" height="160" rx="16" fill="#1e293b" stroke="#334155"/>
      <g font-size="10">
        <g transform="translate(40 44)"><rect width="220" height="20" rx="5" fill="#0b1120" stroke="#334155"/><rect x="6" y="4" width="12" height="12" rx="3" fill="#34d399" fill-opacity="0.8"/><text x="130" y="14" fill="#94a3b8">skill · user</text></g>
        <g transform="translate(40 70)"><rect width="220" height="20" rx="5" fill="#0b1120" stroke="#334155"/><rect x="6" y="4" width="12" height="12" rx="3" fill="#34d399" fill-opacity="0.55"/><text x="130" y="14" fill="#94a3b8">agent · project</text></g>
        <g transform="translate(40 96)"><rect width="220" height="20" rx="5" fill="#0b1120" stroke="#334155"/><rect x="6" y="4" width="12" height="12" rx="3" fill="#34d399" fill-opacity="0.35"/><text x="130" y="14" fill="#94a3b8">hook · user</text></g>
      </g>
      <text x="150" y="148">one searchable list</text>
    </g>

    <!-- 3: collision, shadowed loser struck through -->
    <g transform="translate(810 70)">
      <rect width="300" height="160" rx="16" fill="#1e293b" stroke="#334155"/>
      <g transform="translate(40 50)"><rect width="220" height="24" rx="6" fill="#0f172a" stroke="#34d399" stroke-opacity="0.8"/><text x="110" y="16" font-size="11" fill="#6ee7b7">my-skill · loose (wins)</text></g>
      <g transform="translate(40 84)"><rect width="220" height="24" rx="6" fill="#0b1120" stroke="#334155"/><text x="110" y="16" font-size="11" fill="#64748b">my-skill · plugin</text><line x1="8" y1="12" x2="212" y2="12" stroke="#64748b" stroke-width="1.5"/></g>
      <text x="150" y="148">which one wins</text>
    </g>

  </g>
</svg>
